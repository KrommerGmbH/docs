name: Deploy docs to subdomain

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs-deploy-subdomain.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build VitePress docs
        run: pnpm docs:build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Preferred: DOCS_DEPLOY_SSH_KEY_B64 (base64 of private key file, single line)
          # Fallback: DOCS_DEPLOY_SSH_KEY (multiline / escaped / base64)
          if [ -n "${{ secrets.DOCS_DEPLOY_SSH_KEY_B64 }}" ]; then
            printf '%s' "${{ secrets.DOCS_DEPLOY_SSH_KEY_B64 }}" | tr -d '\r\n ' | base64 -d > ~/.ssh/id_deploy 2>/dev/null || {
              echo "Invalid DOCS_DEPLOY_SSH_KEY_B64";
              exit 1;
            }
          else
            KEY_RAW="$(printf '%s' "${{ secrets.DOCS_DEPLOY_SSH_KEY }}" | tr -d '\r')"
            printf '%s' "$KEY_RAW" | perl -pe 's/\\n/\n/g' > ~/.ssh/id_deploy

            if ! ssh-keygen -y -f ~/.ssh/id_deploy > /dev/null 2>&1; then
              if printf '%s' "$KEY_RAW" | base64 -d > ~/.ssh/id_deploy 2>/dev/null; then
                :
              fi
            fi
          fi

          chmod 600 ~/.ssh/id_deploy

          ssh-keygen -y -f ~/.ssh/id_deploy > /dev/null 2>&1 || {
            echo "Invalid SSH private key. Use OpenSSH private key. (Recommended: set DOCS_DEPLOY_SSH_KEY_B64)";
            exit 1;
          }

          ssh-keyscan -p "${{ secrets.DOCS_DEPLOY_PORT || '22' }}" -H "${{ secrets.DOCS_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DOCS_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DOCS_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DOCS_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DOCS_DEPLOY_PATH }}
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -p ${DEPLOY_PORT:-22}" docs/.vitepress/dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
