name: Deploy docs to subdomain

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs-deploy-subdomain.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build VitePress docs
        run: pnpm docs:build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Support both real multiline secrets and single-line secrets with literal "\n"
          printf '%s' "${{ secrets.DOCS_DEPLOY_SSH_KEY }}" | perl -pe 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Fail fast when the private key is malformed (prevents libcrypto runtime failure)
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

          ssh-keyscan -p "${{ secrets.DOCS_DEPLOY_PORT || '22' }}" -H "${{ secrets.DOCS_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DOCS_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DOCS_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DOCS_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DOCS_DEPLOY_PATH }}
        run: |
          rsync -az --delete -e "ssh -p ${DEPLOY_PORT:-22}" docs/.vitepress/dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
